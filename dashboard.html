<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Відвідуваність</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h2>Група КІ-25-1</h2>

<div id="userInfo"></div>

</header>

<div class="container">

<div class="card">

<div class="controls">

<input type="date" id="date">

<select id="lesson">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<select id="subject"></select>

<select id="type">
<option value="lecture">Лекція</option>
<option value="lab">Лабораторна</option>
<option value="seminar">Семінар</option>
<option value="practice">Практика</option>
</select>

<select id="subgroup">
<option value="1">Підгрупа 1</option>
<option value="2">Підгрупа 2</option>
</select>

</div>

</div>

<div class="card">

<table id="studentsTable">

<tr>
<th>Студент</th>
<th>Присутній</th>
</tr>

</table>

<div class="buttons">

<button id="saveBtn">Зберегти</button>

<button id="editBtn">Редагувати</button>

<button id="deleteBtn">Видалити</button>

<a href="stats.html">
<button>Статистика</button>
</a>

</div>
</div>
</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
